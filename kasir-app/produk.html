<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Produk - Kasir MVP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .container { padding: 20px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { flex: 1; max-width: 400px; display: flex; gap: 10px;}
        .tools-container { display: flex; gap: 10px; }
        
        .table-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background-color: #f8f9fa; font-weight: 600; }
        .data-table tbody tr:hover { background-color: #f8f9fa; }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 20px; border-radius: 8px; width: 500px; max-width: 90%; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-store"></i> Kasir MVP</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-cash-register"></i> Transaksi</a></li>
                <li class="active"><a href="produk.html"><i class="fas fa-box"></i> Produk</a></li>
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="laporan.html"><i class="fas fa-file-invoice-dollar"></i> Laporan</a></li>
                <li><a href="pengaturan.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h1>Manajemen Produk</h1>
            </header>

            <div class="container">
                <div class="header-actions">
                    <div class="search-container">
                        <input type="text" id="search-product" class="form-control" placeholder="Cari nama / barcode...">
                    </div>
                    <div class="tools-container">
                        <input type="file" id="csv-file" accept=".csv" style="display: none;">
                        <button class="btn btn-outline" id="btn-import-csv"><i class="fas fa-file-import"></i> Import CSV</button>
                        <button class="btn btn-primary" id="btn-add-product"><i class="fas fa-plus"></i> Tambah Produk</button>
                        <button class="btn btn-danger" id="btn-clear-product"><i class="fas fa-trash"></i> Hapus Semua</button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Barcode</th>
                                <th>Nama Produk</th>
                                <th>Kategori</th>
                                <th>Satuan</th>
                                <th>Harga</th>
                                <th>Stok</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="product-list-table">
                            <!-- Data produk -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form Produk -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-modal">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 20px;">Tambah Produk</h2>
            <form id="product-form">
                <div class="form-group">
                    <label>Barcode</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="pd-barcode" required autocomplete="off" style="flex: 1;">
                        <button type="button" id="btn-scan-product" class="btn btn-icon" title="Scan Barcode"><i class="fas fa-camera"></i></button>
                    </div>
                </div>
                
                <div id="camera-reader-container-product" class="hidden" style="margin-bottom: 20px; border: 1px solid #ddd; padding: 10px; border-radius: 8px;">
                    <div id="reader-product"></div>
                    <button type="button" id="btn-close-camera-product" class="btn btn-danger btn-sm mt-2">Tutup Kamera</button>
                </div>
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="pd-nama" required autocomplete="off">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex:1;">
                        <label>Kategori</label>
                        <input type="text" id="pd-kategori" required autocomplete="off">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Satuan</label>
                        <input type="text" id="pd-satuan" required autocomplete="off" placeholder="Pcs, Kg, dll...">
                    </div>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex:1;">
                        <label>Harga (Rp)</label>
                        <input type="number" id="pd-harga" required min="0">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Stok</label>
                        <input type="number" id="pd-stok" required min="0">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg mt-2">Simpan Produk</button>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cameraScanner.js"></script>
    <script src="js/csvImport.js"></script>
    <script src="js/produk.js"></script>
</body>
</html>
