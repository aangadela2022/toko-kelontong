<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kasir MVP</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .container { padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; }
        .stat-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 20px; }
        .bg-primary-light { background: rgba(67, 97, 238, 0.1); color: var(--primary-color); }
        .bg-success-light { background: rgba(46, 204, 113, 0.1); color: var(--success-color); }
        .bg-warning-light { background: rgba(243, 156, 18, 0.1); color: var(--warning-color); }
        .stat-content h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500;}
        .stat-content .value { font-size: 1.5rem; font-weight: bold; color: var(--text-primary); }
        
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-card h3 { margin-bottom: 15px; color: var(--text-primary); }
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        @media (max-width: 992px) {
             .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-store"></i> Kasir MVP</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-cash-register"></i> Transaksi</a></li>
                <li><a href="produk.html"><i class="fas fa-box"></i> Produk</a></li>
                <li class="active"><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="laporan.html"><i class="fas fa-file-invoice-dollar"></i> Laporan</a></li>
                <li><a href="pengaturan.html"><i class="fas fa-cog"></i> Pengaturan</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h1>Dashboard Statistik</h1>
            </header>

            <div class="container">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon bg-primary-light"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-content">
                            <h3>Transaksi Hari Ini</h3>
                            <div class="value" id="stat-trx-today">0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-success-light"><i class="fas fa-money-bill-wave"></i></div>
                        <div class="stat-content">
                            <h3>Pendapatan Hari Ini</h3>
                            <div class="value" id="stat-revenue-today">Rp 0</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-warning-light"><i class="fas fa-box-open"></i></div>
                        <div class="stat-content">
                            <h3>Total Produk</h3>
                            <div class="value" id="stat-total-products">0</div>
                        </div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Penjualan 7 Hari Terakhir</h3>
                        <div class="chart-container">
                            <canvas id="salesChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>Produk Terlaris (Bulan Ini)</h3>
                        <div class="chart-container">
                            <canvas id="topProductsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
